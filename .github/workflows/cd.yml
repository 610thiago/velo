# Workflow de Integração Contínua (CI)
# Objetivo: executar testes unitários a cada push na branch main.
# Estrutura mantida simples e preparada para futuras expansões.

name: Continuous Deployment
on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCEL_TOKEN: ${{ secrets.VERCELL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_SCOPE: 610thiago-souza-s-projects1
  

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código-fonte
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      # Configura a versão do Node.js utilizada no projeto
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências utilizando o lockfile
      - name: Install dependencies
        run: yarn install

      # Executa os testes unitários com Vitest
      - name: Run unit tests
        run: yarn test

  build-and-deploy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest
    outputs:
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      # Realiza o checkout do código-fonte
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      # Configura a versão do Node.js utilizada no projeto
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências utilizando o lockfile
      - name: Install dependencies
        run: yarn install

      # Obter as configurações do vercel
      - name: Pull Vercel Config
        run: |
          yarn vercel pull --yes \
          --environment=preview \
          --token=$VERCEL_TOKEN  \
          --scope=$VERCEL_SCOPE
      
      # Build para o Vercel
      - name: Build Vercel
        run: yarn vercel build --token=$VERCEL_TOKEN

      # Deploy preview no vercel
      - name: Deploy preview
        id: deploy
        run: |
          URL=$(yarn --silent vercel deploy --prebuilt --target=preview --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE)
          echo "deployment-url=${URL}" >> $GITHUB_OUTPUT

  e2e-tests:
    name: Run E2E Tests
    needs: [build-and-deploy]
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código-fonte
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      # Configura a versão do Node.js utilizada no projeto
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências utilizando o lockfile
      - name: Install dependencies
        run: yarn install

      # Instalação do Chromium e dependências do OS
      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      # Obter a configuração de preview para fornecer o DATABASE_URL aos testes
      - name: Pull Preview Vercel Config for E2E
        run: |
          yarn vercel pull --yes \
          --environment=preview \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE

      # Exporta o DATABASE_URL do preview para o processo do Playwright
      - name: Load Preview Database URL
        run: |
          DATABASE_URL=$(grep '^DATABASE_URL=' .vercel/.env.preview.local | head -n 1 | cut -d= -f2- | sed 's/^=//; s/^"//; s/"$//')
          echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

      # Execução dos Testes de Regressão
      - name: Run E2E Regression Tests
        run: yarn playwright test
        env:
          BASE_URL: ${{ needs.build-and-deploy.outputs.deployment-url }}

      # Relatório de testes Automatizados
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: playwright-report
          path: playwright-report

      #Publicar report JSON do testDino
      - name: Publish Testdino Report
        if: ${{ !cancelled() }}
        run: npx tdpw upload ./playwright-report --token=${{ secrets.TD_TOKEN }}

  promote:
    name: Promote to Production
    needs: [build-and-deploy, e2e-tests]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Pull Vercel Config for Production
        run: |
          yarn vercel pull --yes \
          --environment=production \
          --token=$VERCEL_TOKEN \
          --scope=$VERCEL_SCOPE

      # vercel build ignora .env.production.local — usamos vite build direto com env exportado.
      - name: Build and package for Production
        run: |
          set -a
          # shellcheck disable=SC1091
          . ./.env.production
          set +a

          for var in VITE_SUPABASE_URL VITE_SUPABASE_PUBLISHABLE_KEY VITE_SUPABASE_PROJECT_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::${var} ausente em .env.production"
              exit 1
            fi
          done

          yarn build

          JS_FILE=$(find dist/assets -name 'index-*.js' | head -1)
          if [ -z "$JS_FILE" ]; then
            echo "::error::Bundle JS não encontrado em dist/assets."
            exit 1
          fi
          if ! grep -q "supabase.co" "$JS_FILE"; then
            echo "::error::Vite não embutiu supabase.co — verifique .env.production"
            exit 1
          fi
          if ! grep -q "$VITE_SUPABASE_PROJECT_ID" "$JS_FILE"; then
            echo "::error::Vite não embutiu o project ID de produção."
            exit 1
          fi
          echo "Bundle verificado: $JS_FILE"

          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          echo '{"version":3,"routes":[{"handle":"filesystem"},{"src":"/(.*)","dest":"/index.html"}]}' > .vercel/output/config.json

      - name: Deploy to Production
        run: yarn vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --scope=$VERCEL_SCOPE
    