# Workflow de Integração Contínua (CI)
# Objetivo: executar testes unitários a cada push na branch main.
# Estrutura mantida simples e preparada para futuras expansões.

name: Continuous Integration

on:
  push:
    branches:
      - main

env:
  NODE_VERSION: '24'
  VERCELL_TOKEN: ${{ secrets.VERCELL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCELL_SCOPE: ${{ secrets.VERCELL_SCOPE }}
  

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código-fonte
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      # Configura a versão do Node.js utilizada no projeto
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências utilizando o lockfile
      - name: Install Dependencies
        run: yarn install --immutable

      # Executa os testes unitários com Vitest
      - name: Run Unit Tests
        run: yarn test

  build-and-deplyoy:
    name: Build & Deploy Vercel Preview
    needs: [unit-tests]
    runs-on: ubuntu-latest

    steps:
      # Realiza o checkout do código-fonte
      - name: Checkout Repository
        uses: actions/checkout@v6.0.3

      # Configura a versão do Node.js utilizada no projeto
      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Habilita o Corepack para gerenciamento do Yarn
      - name: Enable Corepack
        run: corepack enable

      # Instala as dependências utilizando o lockfile
      - name: Install Dependencies
        run: yarn install --immutable

      # Obter as configurações do vercel
      - name: Pull Vercel Config
        run: yarn vercel pull --yes --environment=preview --token=$VERCELL_TOKEN  --scope=$VERCELL_SCOPE
      
      # Build para o Vercel
      - name: Build Vercel
        run: yarn vercel build --token=$VERCELL_TOKEN

      # Deploy preview no vercel
      - name: Deploy preview
        run: yarn vercel deploy --prebuilt --taget=preview --token=$VERCELL_TOKEN --scope=$VERCELL_SCOPE

    